<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confession Box</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --primary:#ff4b5c;
    --bg:linear-gradient(135deg,#fff5f6,#ffe3e6);
}

body {
    font-family:'Segoe UI',system-ui;
    background:var(--bg);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* card */
.card {
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:18px;
    width:100%;
    max-width:380px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* fullscreen */
.fullscreen {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    max-width:none;
    border-radius:0;
    z-index:5;
    overflow:hidden;
}

/* inputs */
input,select {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ffc4cb;
    outline:none;
}

/* textarea */
textarea {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:14px;
    border:1px solid #ffc4cb;
    outline:none;
    height:120px;
    resize:none;
    font-size:16px;
}

textarea::placeholder {
    font-size:18px;
    color:#777;
}

button {
    width:100%;
    padding:12px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* tabs */
.tabs {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:white;
    padding:8px 0;
    box-shadow:0 -4px 10px rgba(0,0,0,0.1);
    z-index:20;
}

.tab {
    text-align:center;
    font-size:12px;
    cursor:pointer;
}
.active { color:var(--primary); font-weight:bold; }

/* 🔥 FEED FIX (IMPORTANT) */
.feed {
    height:calc(100vh - 110px);
    overflow-y:auto;
    text-align:left;
    padding:10px;
    padding-bottom:100px;
    box-sizing:border-box;
}

/* 🔥 MAIN FIX HERE */
.feed-item {
    background:#fff;
    padding:12px;
    margin:10px 0;
    border-radius:12px;

    width:100%;
    max-width:100%;
    box-sizing:border-box;

    /* TEXT FIX */
    word-break: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
}

/* hidden */
.hidden { display:none; }
</style>
</head>

<body>

<div class="card">

<!-- REGISTER -->
<div id="registerView">
    <h2>Create Profile</h2>
    <input id="username" placeholder="Your Name">
    <input id="userclass" placeholder="Class / Section">
    <select id="usergender">
        <option disabled selected>Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>
    <button onclick="saveProfile()">Create Profile</button>
</div>

<!-- CONFESSION -->
<div id="confessionView" class="hidden">
    <h2>Express Your Feelings ❤️</h2>
    <textarea id="confessionMessage"
    placeholder="Write your secret confession here..."></textarea>

    <button id="sendBtn" onclick="sendConfession()">Send Confession 🚀</button>
    <p id="sendLabel"></p>
</div>

<!-- PROFILE -->
<div id="profileView" class="hidden">
    <h2>Your Profile</h2>
    <p id="profileInfo"></p>
    <button onclick="showEdit()">Edit</button>
</div>

<!-- EDIT -->
<div id="editView" class="hidden">
    <h2>Edit Profile</h2>
    <input id="editName">
    <input id="editClass">
    <select id="editGender">
        <option>Male</option>
        <option>Female</option>
    </select>
    <button onclick="updateProfile()">Save</button>
</div>

<!-- FEED -->
<div id="feedView" class="hidden">
    <h2>Confession Feed 🌐</h2>
    <div class="feed" id="feedList"></div>
</div>

</div>

<!-- TABS -->
<div class="tabs hidden" id="tabs">
    <div class="tab" onclick="showTab('profile')">👤<br>You</div>
    <div class="tab active" onclick="showTab('confession')">➕<br>New</div>
    <div class="tab" onclick="showTab('feed')">🌐<br>Feed</div>
</div>

<script>
const SUPABASE_URL="https://gsckseffapurzqkexeup.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_JWdBSaFEpNjTuKEHTcno5w_9hKO5Eu7";

let supabaseClient;

window.onload=()=>{
    if(localStorage.getItem('sb_name')){
        registerView.classList.add('hidden');
        tabs.classList.remove('hidden');
        showTab('confession');
    }
};

/* profile */
function saveProfile(){
    localStorage.setItem('sb_name',username.value);
    localStorage.setItem('sb_class',userclass.value);
    localStorage.setItem('sb_gender',usergender.value);

    registerView.classList.add('hidden');
    tabs.classList.remove('hidden');
    showTab('confession');
}

function loadProfile(){
    profileInfo.innerText =
    `Name: ${localStorage.getItem('sb_name')}
Class: ${localStorage.getItem('sb_class')}
Gender: ${localStorage.getItem('sb_gender')}`;
}

/* edit */
function showEdit(){
    profileView.classList.add('hidden');
    editView.classList.remove('hidden');

    editName.value=localStorage.getItem('sb_name');
    editClass.value=localStorage.getItem('sb_class');
    editGender.value=localStorage.getItem('sb_gender');
}

function updateProfile(){
    localStorage.setItem('sb_name',editName.value);
    localStorage.setItem('sb_class',editClass.value);
    localStorage.setItem('sb_gender',editGender.value);

    editView.classList.add('hidden');
    profileView.classList.remove('hidden');
    loadProfile();
}

/* tabs */
function showTab(tab){
    confessionView.classList.add('hidden');
    profileView.classList.add('hidden');
    editView.classList.add('hidden');
    feedView.classList.add('hidden');

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.card').classList.remove('fullscreen');

    if(tab==='confession'){
        confessionView.classList.remove('hidden');
        document.querySelectorAll('.tab')[1].classList.add('active');
    }

    if(tab==='profile'){
        profileView.classList.remove('hidden');
        loadProfile();
        document.querySelectorAll('.tab')[0].classList.add('active');
    }

    if(tab==='feed'){
        feedView.classList.remove('hidden');
        document.querySelector('.card').classList.add('fullscreen');
        loadFeed();
        document.querySelectorAll('.tab')[2].classList.add('active');
    }
}

/* send */
async function sendConfession(){
    const msg=confessionMessage.value.trim();
    const label=sendLabel;
    const btn=document.getElementById("sendBtn");

    if(!msg) return;

    label.innerText="Sending...";
    btn.disabled=true;

    if(!supabaseClient){
        supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    }

    const {error}=await supabaseClient.from('confessions').insert([{
        name:localStorage.getItem('sb_name'),
        class:localStorage.getItem('sb_class'),
        gender:localStorage.getItem('sb_gender'),
        message:msg
    }]);

    btn.disabled=false;

    if(error){
        label.innerText="Error";
    } else {
        label.innerText="Sent";
        confessionMessage.value="";
    }
}

/* feed */
async function loadFeed(){
    feedList.innerHTML = "<p style='text-align:center'>Loading confessions...</p>";

    if(!supabaseClient){
        supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    }

    const {data,error}=await supabaseClient
        .from('confessions')
        .select("*")
        .order('id',{ascending:false});

    if(error){
        feedList.innerHTML = "<p style='text-align:center;color:red'>Failed to load</p>";
        return;
    }

    if(!data || data.length===0){
        feedList.innerHTML = "<p style='text-align:center'>No confessions yet</p>";
        return;
    }

    feedList.innerHTML="";

    data.forEach(item=>{
        const div=document.createElement('div');
        div.className="feed-item";

        let name = item.name===localStorage.getItem('sb_name') ? "You" : "Anonymous";

        div.innerHTML = `<b>${name}</b> (${item.class})<br>${item.message}`;
        feedList.appendChild(div);
    });
}
</script>
</body>
</html>
